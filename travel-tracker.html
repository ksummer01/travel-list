<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Travel"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Travel Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eae9e4;
      --text:#111110;--text2:#6b6a65;--text3:#a8a7a2;
      --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
      --accent:#111110;--accent-fg:#ffffff;
      --green:#1D9E75;--green-bg:#e1f5ee;--green-text:#085041;
      --danger-bg:#fff0f0;--danger:#c0392b;
      --ocean:#d0e8f0;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#111110;--bg2:#1c1c1a;--bg3:#252522;
        --text:#f0ede8;--text2:#9a9891;--text3:#5a5955;
        --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
        --accent:#f0ede8;--accent-fg:#111110;
        --green:#1D9E75;--green-bg:#04342c;--green-text:#9fe1cb;
        --danger-bg:#2a1515;--danger:#e05c5c;
        --ocean:#1a2e38;
      }
    }
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    .app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
    .header{padding:calc(var(--safe-top) + 18px) 18px 14px;background:var(--bg);border-bottom:0.5px solid var(--border)}
    .header h1{font-size:24px;font-weight:600;letter-spacing:-0.4px}
    .header-sub{font-size:13px;color:var(--text3);margin-top:2px}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
    .stat{background:var(--bg2);border-radius:10px;padding:10px 12px}
    .stat-num{font-size:20px;font-weight:600}
    .stat-label{font-size:11px;color:var(--text3);margin-top:1px}
    .tabs{display:flex;padding:0 16px;border-bottom:0.5px solid var(--border);background:var(--bg)}
    .tab{font-size:13px;padding:10px 14px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
    .pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:none}
    .pane.active{display:block}
    .map-wrap{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--ocean);margin-bottom:10px}
    .map-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px}
    .legend{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px;color:var(--text2)}
    .leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
    .section-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin:14px 0 6px}
    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;min-height:20px}
    .tag{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--green-bg);color:var(--green-text);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .empty-map{font-size:13px;color:var(--text3)}
    .add-row{display:flex;gap:8px;margin-bottom:14px}
    .add-input{flex:1;height:44px;padding:0 14px;border-radius:12px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;outline:none}
    .add-input::placeholder{color:var(--text3)}
    .add-input:focus{border-color:var(--accent)}
    .add-submit{width:44px;height:44px;border-radius:12px;border:none;background:var(--accent);color:var(--accent-fg);font-size:22px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .checklist{display:flex;flex-direction:column;gap:4px}
    .ci{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:0.5px solid var(--border);background:var(--bg)}
    .ci.done{opacity:0.45}
    .ci.done .ci-txt{text-decoration:line-through;color:var(--text3)}
    .ci-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;-webkit-tap-highlight-color:transparent}
    .ci-circle.on{background:var(--accent);border-color:var(--accent)}
    .ci-circle svg{display:none;stroke:var(--accent-fg);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .ci-circle.on svg{display:block}
    .ci-txt{flex:1;font-size:15px}
    .ci-del{width:28px;height:28px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:17px;border-radius:8px;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center}
    .ci-del:active{background:var(--danger-bg);color:var(--danger)}
    svg.map path{cursor:pointer;stroke:#fff;stroke-width:0.4;transition:fill 0.2s;-webkit-tap-highlight-color:transparent}
    svg.map path.v{fill:var(--green)}
    svg.map path.uv{fill:#b8cfd8}
    @media(prefers-color-scheme:dark){svg.map path.uv{fill:#2a3e48}}
    svg.map path:active{opacity:0.7}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Travel Tracker</h1>
    <div class="header-sub">Colour the world as you go</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="s-c">0</div><div class="stat-label">countries</div></div>
    <div class="stat"><div class="stat-num" id="s-s">0</div><div class="stat-label">AU states</div></div>
    <div class="stat"><div class="stat-num" id="s-p">0%</div><div class="stat-label">of world</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('world',this)">World</button>
    <button class="tab" onclick="showTab('aus',this)">Australia</button>
    <button class="tab" onclick="showTab('list',this)">Checklist</button>
  </div>

  <div class="pane active" id="pane-world">
    <div class="map-label">Tap a country to mark visited</div>
    <div class="map-wrap">
      <svg class="map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" id="world-svg"></svg>
    </div>
    <div class="legend"><div class="leg-dot" style="background:var(--green)"></div>Visited<div class="leg-dot" style="background:#b8cfd8;margin-left:8px"></div>Not yet</div>
    <div class="section-lbl">Countries visited (<span id="cv">0</span>)</div>
    <div class="tags-wrap" id="c-tags"></div>
  </div>

  <div class="pane" id="pane-aus">
    <div class="map-label">Tap a state or territory</div>
    <div class="map-wrap">
      <svg class="map" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" id="aus-svg"></svg>
    </div>
    <div class="legend"><div class="leg-dot" style="background:var(--green)"></div>Visited<div class="leg-dot" style="background:#b8cfd8;margin-left:8px"></div>Not yet</div>
    <div class="section-lbl">States visited (<span id="sv">0</span> / 8)</div>
    <div class="tags-wrap" id="s-tags"></div>
  </div>

  <div class="pane" id="pane-list">
    <div class="add-row">
      <input class="add-input" id="new-place" type="text" placeholder="Add a place to visit…" maxlength="80"/>
      <button class="add-submit" onclick="addPlace()" aria-label="Add">+</button>
    </div>
    <div class="section-lbl">To visit</div>
    <div class="checklist" id="todo-cl"></div>
    <div class="section-lbl" id="done-lbl" style="display:none">Visited</div>
    <div class="checklist" id="done-cl"></div>
  </div>
</div>

<script>
const TOTAL_COUNTRIES = 195;
let data = {vc:[],vs:[],cl:[]};

function load(){
  try{const r=localStorage.getItem('travel_v2');if(r)data=JSON.parse(r);}catch(e){}
  if(!data.vc)data.vc=[];if(!data.vs)data.vs=[];if(!data.cl)data.cl=[];
}
function save(){try{localStorage.setItem('travel_v2',JSON.stringify(data));}catch(e){}}

function showTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
}

function updateStats(){
  document.getElementById('s-c').textContent=data.vc.length;
  document.getElementById('s-s').textContent=data.vs.length;
  document.getElementById('s-p').textContent=Math.round(data.vc.length/TOTAL_COUNTRIES*100)+'%';
}

function buildWorld(){
  const svg=document.getElementById('world-svg');
  svg.innerHTML=worldPaths().map(([id,name,d])=>`<path id="c${id}" data-id="${id}" data-name="${name}" class="${data.vc.includes(id)?'v':'uv'}" d="${d}"/>`).join('');
  svg.querySelectorAll('path').forEach(p=>p.addEventListener('click',()=>toggleC(p.dataset.id,p.dataset.name)));
}
function toggleC(id,name){
  const i=data.vc.indexOf(id);i>=0?data.vc.splice(i,1):data.vc.push(id);
  save();
  const p=document.getElementById('c'+id);if(p)p.className=data.vc.includes(id)?'v':'uv';
  renderCTags();updateStats();
}
function renderCTags(){
  document.getElementById('cv').textContent=data.vc.length;
  const w=document.getElementById('c-tags');
  if(!data.vc.length){w.innerHTML='<span class="empty-map">None yet — tap the map!</span>';return;}
  const names=getAllCountries();
  w.innerHTML=data.vc.map(id=>{const n=names[id]||id;return`<span class="tag" onclick="toggleC('${id}','${n}')">${n} ✕</span>`;}).join('');
}

function buildAus(){
  const svg=document.getElementById('aus-svg');
  svg.innerHTML=ausPaths().map(([id,name,d])=>`<path id="s${id}" data-id="${id}" data-name="${name}" class="${data.vs.includes(id)?'v':'uv'}" d="${d}"/>`).join('')+ausLabels();
  svg.querySelectorAll('path').forEach(p=>p.addEventListener('click',()=>toggleS(p.dataset.id,p.dataset.name)));
}
function toggleS(id,name){
  const i=data.vs.indexOf(id);i>=0?data.vs.splice(i,1):data.vs.push(id);
  save();
  const p=document.getElementById('s'+id);if(p)p.className=data.vs.includes(id)?'v':'uv';
  renderSTags();updateStats();
}
function renderSTags(){
  document.getElementById('sv').textContent=data.vs.length;
  const w=document.getElementById('s-tags');
  const names={NSW:'New South Wales',VIC:'Victoria',QLD:'Queensland',WA:'Western Australia',SA:'South Australia',TAS:'Tasmania',ACT:'ACT',NT:'Northern Territory'};
  if(!data.vs.length){w.innerHTML='<span class="empty-map">None yet — tap the map!</span>';return;}
  w.innerHTML=data.vs.map(id=>`<span class="tag" onclick="toggleS('${id}','${names[id]||id}')">${names[id]||id} ✕</span>`).join('');
}

function renderChecklist(){
  const todo=data.cl.filter(i=>!i.done);
  const done=data.cl.filter(i=>i.done);
  document.getElementById('todo-cl').innerHTML=todo.length?todo.map(ciHTML).join(''):'<div style="font-size:14px;color:var(--text3);padding:8px 0">Add places above</div>';
  document.getElementById('done-cl').innerHTML=done.map(ciHTML).join('');
  document.getElementById('done-lbl').style.display=done.length?'block':'none';
}
function ciHTML(i){
  return`<div class="ci${i.done?' done':''}"><div class="ci-circle${i.done?' on':''}" onclick="toggleCI(${i.id})"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6.5 4.5,9 10,3"/></svg></div><span class="ci-txt">${esc(i.text)}</span><button class="ci-del" onclick="delCI(${i.id})" aria-label="Delete">✕</button></div>`;
}
function addPlace(){
  const inp=document.getElementById('new-place');
  const t=inp.value.trim();if(!t)return;
  data.cl.unshift({id:Date.now(),text:t,done:false});
  inp.value='';save();renderChecklist();
}
function toggleCI(id){data.cl=data.cl.map(i=>i.id===id?{...i,done:!i.done}:i);save();renderChecklist();}
function delCI(id){data.cl=data.cl.filter(i=>i.id!==id);save();renderChecklist();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('new-place').addEventListener('keydown',e=>{if(e.key==='Enter')addPlace();});

  const m={};list.forEach(([k,v])=>m[k]=v);return m;
}

function ausLabels(){
  return`<text x="240" y="370" font-size="18" fill="#888" text-anchor="middle" pointer-events="none">WA</text><text x="455" y="190" font-size="18" fill="#888" text-anchor="middle" pointer-events="none">NT</text><text x="455" y="420" font-size="18" fill="#888" text-anchor="middle" pointer-events="none">SA</text><text x="590" y="280" font-size="18" fill="#888" text-anchor="middle" pointer-events="none">QLD</text><text x="620" y="430" font-size="16" fill="#888" text-anchor="middle" pointer-events="none">NSW</text><text x="590" y="510" font-size="15" fill="#888" text-anchor="middle" pointer-events="none">VIC</text><text x="620" y="590" font-size="14" fill="#888" text-anchor="middle" pointer-events="none">TAS</text><text x="660" y="462" font-size="11" fill="#888" text-anchor="middle" pointer-events="none">ACT</text>`;
}
